name: Build ArzabcWG APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          # Отключаем кэш полностью, чтобы избежать ошибок с контрольными суммами
          cache: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          # Находим NDK
          NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -type d | sort -V | tail -n 1)
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$NDK_PATH" >> local.properties
          
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # ГЕНЕРАЛЬНАЯ УБОРКА GO
          cd tunnel
          go clean -modcache
          go mod download
          go mod tidy
          cd ..
          
          # Сборка
          ./gradlew assembleDebug -x lint --no-daemon -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ArzabcWG-Debug-File
          path: "**/build/outputs/apk/debug/*.apk"
