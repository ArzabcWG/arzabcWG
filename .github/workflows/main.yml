name: Build ArzabcWG APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install NDK
        run: |
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          echo "ndk.dir=${ANDROID_HOME}/ndk/26.1.10909125" > local.properties
          export PATH=$PATH:$(go env GOPATH)/bin
          # Запускаем сборку без демона и с принудительным ограничением потоков
          ./gradlew assembleDebug -x lint --no-daemon -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ArzabcWG-Debug-File
          path: "**/build/outputs/apk/debug/*.apk"
